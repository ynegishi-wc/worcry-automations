# ==============================================================
# AOHARUインターン ダッシュボード自動更新 — GitHub Actions
#
# 毎週月曜 09:00 JST (日曜 24:00 UTC) に実行
# 手動実行も可能
#
# 処理:
#   1. Google Sheetsから最新KPIデータ取得
#   2. public/dashboard_AOHARU_週次ステップ率.html を更新
#   3. public/dashboard_AOHARU_マーケ数値.html を更新
#   4. 変更をコミット＆プッシュ
#   5. Netlify CLI で public/ をデプロイ
# ==============================================================

name: ダッシュボード自動更新（週次）

on:
  schedule:
    # 毎週月曜 09:00 JST = 日曜 24:00 UTC
    - cron: '0 0 * * 1'

  workflow_dispatch:
    inputs:
      target:
        description: '更新対象'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - step-rate
          - marke

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 週次ステップ率ダッシュボード更新
        run: |
          TODAY=$(TZ=Asia/Tokyo date '+%Y年%-m月%-d日')
          sed -i "s/最終更新: .*（スプレッドシート連携）/最終更新: ${TODAY}（スプレッドシート連携）/" public/dashboard_AOHARU_週次ステップ率.html
          echo "最終更新日を ${TODAY} に更新しました"

      - name: マーケ数値ダッシュボード更新
        if: >
          github.event_name == 'schedule' ||
          github.event.inputs.target == 'both' ||
          github.event.inputs.target == 'marke'
        env:
          DASHBOARD_PATH: public/dashboard_AOHARU_マーケ数値.html
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, 'scripts')
          import aggregate_marke as am
          am.DASHBOARD_HTML = os.environ['DASHBOARD_PATH']
          am.main()
          "

      - name: 変更をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "変更なし"
          else
            git add public/
            git commit -m "chore: update dashboards ($(TZ=Asia/Tokyo date '+%Y-%m-%d')) [skip ci]"
            git push origin HEAD:main
          fi

      - name: Deploy to Netlify
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=public --site=${{ secrets.NETLIFY_SITE_ID_AOHARU }} --auth=${{ secrets.NETLIFY_TOKEN }}
          netlify deploy --prod --dir=public --site=${{ secrets.NETLIFY_SITE_ID_MARKE }} --auth=${{ secrets.NETLIFY_TOKEN }}
