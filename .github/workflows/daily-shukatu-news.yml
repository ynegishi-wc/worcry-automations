name: Daily Shukatu News

on:
  schedule:
    # JST平日8:00 = UTC日〜木23:00
    - cron: '0 23 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests

      - name: Run daily shukatu news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/daily_shukatu_news.py

      - name: Commit updated post_history.log
        if: success()
        run: |
          if [ -n "$(git status --porcelain scripts/post_history.log)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scripts/post_history.log
            git commit -m "chore: update post_history.log"
            git push
          else
            echo "No changes to post_history.log"
          fi
